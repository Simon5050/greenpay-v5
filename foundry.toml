[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"
]

[profile.default.fuzz]
runs = 256

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"
localhost   = "http://127.0.0.1:8545"

[etherscan]
arc_testnet = { key = "${EXPLORER_API_KEY}", url = "${EXPLORER_API_URL}" }

[fmt]
line_length     = 100
tab_width       = 4
bracket_spacing = true
